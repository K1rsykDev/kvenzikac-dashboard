<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KvenzikAC — Login</title>
<link rel="stylesheet" href="style.css"/>
<script src="i18n.js"></script>
</head>
<body class="login-page">

<div class="login-bg">
  <div class="login-orb login-orb-1"></div>
  <div class="login-orb login-orb-2"></div>
</div>

<div class="lang-switcher-topright" id="lang-switcher-topright"></div>

<div class="login-box">
  <div class="login-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
    </svg>
    KvenzikAC
  </div>
  <div class="login-subtitle" data-i18n="login_subtitle">AI Anticheat — Control Panel</div>

  <div class="login-divider"></div>

  <button class="btn-discord" onclick="window.location.href = BACKEND + '/auth/login'">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
      <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.033.055a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
    </svg>
    <span data-i18n="btn_discord">Sign in with Discord</span>
  </button>

  <div class="login-or"><span data-i18n="login_or">or</span></div>

  <div id="tg-widget-wrap">
    <script async src="https://telegram.org/js/telegram-widget.js?22"
      data-telegram-login="KvenzikAC_bot"
      data-size="large"
      data-radius="10"
      data-onauth="onTelegramAuth(user)"
      data-request-access="write">
    </script>
  </div>
  <div id="tg-loading" style="display:none" class="tg-loading-text" data-i18n="status_checking">Checking...</div>

  <div class="login-features">
    <div class="login-feature">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      <span data-i18n="feature_1">Real-time alert monitoring</span>
    </div>
    <div class="login-feature">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      <span data-i18n="feature_2">Player statistics</span>
    </div>
    <div class="login-feature">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      <span data-i18n="feature_3">AI aim analysis</span>
    </div>
  </div>

  <div class="login-note" data-i18n="login_note">Sign in with Discord or Telegram</div>
</div>

<script>
const BACKEND = "https://kvenzikac-backend.up.railway.app";

// Если токен есть — проверяем его валидность перед редиректом
(async function() {
  var token = localStorage.getItem("kac_token");
  if (!token) return; // нет токена — остаёмся на логине
  try {
    var res = await fetch(BACKEND + "/auth/verify?token=" + token);
    if (!res.ok) {
      // Бэкенд вернул ошибку — если 401/403 чистим токен, иначе просто остаёмся
      if (res.status === 401 || res.status === 403) localStorage.removeItem("kac_token");
      return;
    }
    var data = await res.json();
    if (data.authenticated) {
      window.location.href = "index.html";
    } else {
      localStorage.removeItem("kac_token");
    }
  } catch(e) {
    // Сеть недоступна — остаёмся на логине, не трогаем токен
  }
})();

buildLangSwitcher("lang-switcher-topright");
applyLang();

async function onTelegramAuth(user) {
  document.getElementById("tg-widget-wrap").style.display = "none";
  document.getElementById("tg-loading").style.display = "";
  try {
    var res = await fetch(BACKEND + "/auth/telegram", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(user)
    });
    var data = await res.json();
    if (!res.ok) {
      alert("Error: " + (data.detail || res.status));
      document.getElementById("tg-widget-wrap").style.display = "";
      document.getElementById("tg-loading").style.display = "none";
      return;
    }
    localStorage.setItem("kac_token", data.token);
    window.location.href = "index.html";
  } catch(e) {
    alert("Connection error");
    document.getElementById("tg-widget-wrap").style.display = "";
    document.getElementById("tg-loading").style.display = "none";
  }
}
</script>
</body>
</html>
